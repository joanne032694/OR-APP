<title>我的班表查詢</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --acc:#1a56a0;--acc2:#2471c8;--acd:#e8f0fa;
  --grn:#0f7b4a;--amb:#b45309;--amd:#fef3cd;
  --red:#c0392b;--pur:#6b21a8;
  --bg:#f0f4f8;--sur:#fff;--bdr:#000;
  --t1:#1a2332;--t2:#4a5568;--t3:#8a9ab0;
  --f:"Noto Sans TC",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--f);background:var(--bg);color:var(--t1);min-height:100vh;}

.hdr{background:var(--acc);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 6px rgba(0,0,0,.2);}
.hdr h1{font-size:18px;font-weight:900;}
.hdr .sub{font-size:11px;opacity:.75;}

.main{padding:14px 12px 30px;max-width:780px;margin:0 auto;}

/* ── 登入卡片 ── */
.login-card{background:var(--sur);border:1.5px solid var(--bdr);border-radius:12px;padding:28px 24px;text-align:center;margin-top:30px;}
.login-card .icon{font-size:46px;margin-bottom:8px;}
.login-card h2{font-size:18px;margin-bottom:6px;color:var(--t1);}
.login-card .desc{font-size:13px;color:var(--t3);margin-bottom:20px;}
.login-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.login-input{border:1.5px solid var(--bdr);border-radius:8px;padding:12px 16px;font-size:18px;font-family:var(--f);width:200px;text-align:center;outline:none;font-weight:700;letter-spacing:2px;}
.login-input:focus{border-color:var(--acc2);background:var(--acd);}
.login-btn{background:var(--acc);color:#fff;border:none;border-radius:8px;padding:12px 24px;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--f);}
.login-btn:hover{background:#0f3778;}
.login-err{color:var(--red);font-size:13px;margin-top:12px;font-weight:700;display:none;}

/* ── 個人資訊卡 ── */
.profile-card{background:var(--sur);border:1.5px solid var(--bdr);border-radius:10px;padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.profile-l{display:flex;align-items:center;gap:12px;}
.avatar{width:46px;height:46px;border-radius:50%;background:var(--acc);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;flex-shrink:0;}
.profile-name{font-size:18px;font-weight:900;color:var(--t1);}
.profile-emp{font-size:12px;color:var(--t3);}
.logout-btn{background:#f3f4f6;color:var(--t2);border:1.5px solid #ddd;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--f);}
.logout-btn:hover{background:#e5e7eb;}

/* ── 月份切換 ── */
.month-nav{display:flex;align-items:center;justify-content:space-between;background:var(--sur);border:1.5px solid var(--bdr);border-radius:10px;padding:10px 16px;margin-bottom:14px;}
.month-nav .mtitle{font-size:18px;font-weight:900;color:var(--acc);}
.nav-btn{background:var(--acd);border:1.5px solid var(--acc2);border-radius:6px;width:34px;height:34px;font-size:16px;font-weight:900;color:var(--acc);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.nav-btn:hover{background:var(--acc2);color:#fff;}
.nav-btn:disabled{opacity:.3;cursor:default;}

/* ── 統計列 ── */
.stat-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.stat-pill{background:var(--sur);border:1.5px solid var(--bdr);border-radius:8px;padding:10px 6px;text-align:center;}
.stat-pill .num{font-size:20px;font-weight:900;color:var(--acc);}
.stat-pill .lbl{font-size:10px;color:var(--t3);margin-top:2px;}

/* ── 月曆 ── */
.cal-wrap{background:var(--sur);border:1.5px solid var(--bdr);border-radius:10px;overflow:hidden;margin-bottom:14px;}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);background:var(--acc);}
.cal-head div{color:#fff;text-align:center;padding:8px 0;font-size:12px;font-weight:700;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-cell{
  min-height:74px;border-right:1px solid #eee;border-bottom:1px solid #eee;
  padding:4px 4px;position:relative;cursor:pointer;transition:.12s;
}
.cal-cell:nth-child(7n){border-right:none;}
.cal-cell.empty{background:#fafbfc;cursor:default;}
.cal-cell.today{background:#fffbe6;}
.cal-cell:hover:not(.empty){background:var(--acd);}
.cal-cell .dnum{font-size:12px;font-weight:700;color:var(--t2);}
.cal-cell.today .dnum{color:var(--amb);font-weight:900;}
.cal-cell .shift-tag{
  margin-top:4px;display:inline-block;font-size:13px;font-weight:900;

}
.cal-cell .star{color:var(--amb);font-size:11px;margin-left:1px;}
.cal-cell .extra{font-size:9px;color:var(--t3);margin-top:2px;display:block;}

.shift-D{background:#e8f0fa;color:var(--acc);}
.shift-E{background:#f3e8ff;color:var(--pur);}
.shift-N{background:#fdf2f8;color:#be185d;}
.shift-128{background:var(--amd);color:var(--amb);}
.shift-off{background:#fee2e2;color:#c0392b;}
.shift-special{background:#fef9c3;color:#92400e;}

  .cal-cell{min-height:78px;padding:5px 3px;}

.legend-item{display:flex;align-items:center;gap:5px;}
.legend-dot{width:14px;height:14px;border-radius:3px;}

/* ── 詳情 Modal ── */
#dayModal{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.5);align-items:flex-end;justify-content:center;}

.page{display:none;}
.page.active{display:block;}

<div class="hdr">

  </div>
</div>

<div class="main">

        <div>

      </div>
      <button class="logout-btn" onclick="doLogout()">↩ 查詢其他員編</button>

    <div class="month-nav">

      <div class="legend-item"><div class="legend-dot shift-N"></div>大夜</div>
      <div class="legend-item"><div class="legend-dot shift-128"></div>12-8</div>
      <div class="legend-item"><div class="legend-dot shift-special"></div>包班／特殊</div>
      <div class="legend-item"><div class="legend-dot shift-off"></div>休假</div>
      <div class="legend-item">★ = 控台</div>
    </div>
  </div>

</div>

<!-- 單日詳情 -->
<div id="dayModal">

</div>

// ══════════════════════════════════════════
// 班別解析與顯示
// ══════════════════════════════════════════
function parseDisplayShift(raw){
  if(!raw) return {cls:'shift-off', label:'—', star:false};
  const v = raw.trim();
  const offSet = ['休','例','國','公','婚','喪','產檢','病'];
  if(offSet.includes(v)) return {cls:'shift-off', label:v, star:false};
  if(v==='V') return {cls:'shift-off', label:'特休', star:false};
  if(v==='H') return {cls:'shift-off', label:'排休', star:false};
  if(v==='12-8'||v==='11-8') return {cls:'shift-128', label:v, star:false};
  const star = v.includes('★');
  const clean = v.replace('★','').replace('*','');
  if(clean.startsWith('E')) return {cls:'shift-E', label:'小夜', star};
  if(clean.startsWith('N')) return {cls:'shift-N', label:'大夜', star};
  if(/^D\d+/.test(clean)) return {cls:'shift-special', label:clean, star};
  if(clean.startsWith('D')) return {cls:'shift-D', label:'白班', star};
  return {cls:'shift-off', label:v, star:false};
}

function ctrlLabel(raw, dayOfWeek){
  if(!raw) return '—';
  if(raw.includes('★')){
    if(raw.startsWith('E')) return '小夜控台 ★';
    if(raw.startsWith('N')) return '大夜控台 ★';
    if(raw.startsWith('D')) return '白班控台 ★';
  }
  return '—';
}

// ══════════════════════════════════════════
// 登入 / 登出
// ══════════════════════════════════════════
const SHARED_PASSWORD = 'A030';

function doLogin(){
  const pw = document.getElementById('pwInput').value.trim();
  const id = document.getElementById('empIdInput').value.trim();
  const err = document.getElementById('loginErr');
  if(!pw){ err.style.display='block'; err.textContent='請輸入通用密碼'; return; }
  if(pw !== SHARED_PASSWORD){ err.style.display='block'; err.textContent='密碼錯誤，請確認後再試一次'; return; }
  if(!id){ err.style.display='block'; err.textContent='請輸入員編'; return; }
  const found = Object.entries(EMP_ID_MAP).find(([name, eid]) => eid === id);
  if(!found){ err.style.display='block'; err.textContent='查無此員編，請確認後再試一次'; return; }
  err.style.display='none';
  currentName = found[0];
  currentEmpId = found[1];
  localStorage.setItem('my_schedule_emp', currentEmpId);
  localStorage.setItem('my_schedule_pw', pw);
  showPage('calendar');
  renderProfile();
  renderCalendar();
}
function doLogout(){
  currentEmpId = null; currentName = null;
  localStorage.removeItem('my_schedule_emp');
  localStorage.removeItem('my_schedule_pw');
  document.getElementById('empIdInput').value='';
  document.getElementById('pwInput').value='';
  document.getElementById('loginErr').style.display='none';
  showPage('login');
}
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
}

function renderProfile(){
  document.getElementById('profileName').textContent = currentName;
  document.getElementById('profileEmp').textContent = '員編 ' + currentEmpId;
  document.getElementById('avatarTxt').textContent = currentName.slice(-2);
}

// ══════════════════════════════════════════
// 月份切換
// ══════════════════════════════════════════
function changeMonth(delta){
  let m = viewMonth + delta;
  let y = viewYear;
  if(m > 12){ m = 1; y++; }
  if(m < 1){ m = 12; y--; }
  const key = y+'-'+m;
  if(!SCHEDULES[key]){ return; } // 只有有資料的月份可切換
  viewMonth = m; viewYear = y;
  renderCalendar();
}

// ══════════════════════════════════════════
// 月曆渲染
// ══════════════════════════════════════════
function renderCalendar(){
  const key = viewYear+'-'+viewMonth;
  const schedule = SCHEDULES[key];
  document.getElementById('monthTitle').textContent = MONTH_LABELS[key] || (viewYear+'年'+viewMonth+'月');
  document.getElementById('prevBtn').disabled = !SCHEDULES[(viewMonth-1<1?viewYear-1:viewYear)+'-'+(viewMonth-1<1?12:viewMonth-1)];
  document.getElementById('nextBtn').disabled = !SCHEDULES[(viewMonth+1>12?viewYear+1:viewYear)+'-'+(viewMonth+1>12?1:viewMonth+1)];

  if(!schedule){
    document.getElementById('calGrid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#9ca3af;">本月尚無班表資料</div>';

    return;
  }

  const personalSched = schedule[currentName] || {};
  const daysInMonth = new Date(viewYear, viewMonth, 0).getDate();
  const firstDay = new Date(viewYear, viewMonth-1, 1).getDay();
  const today = new Date();
  const isThisMonth = today.getFullYear()===viewYear && (today.getMonth()+1)===viewMonth;
  const todayDate = today.getDate();

  // 統計
  let countD=0, countE=0, countN=0, count128=0, countOff=0, countStar=0;
  Object.values(personalSched).forEach(raw=>{
    const s = parseDisplayShift(raw);
    if(s.star) countStar++;
    if(s.cls==='shift-D') countD++;
    else if(s.cls==='shift-E') countE++;
    else if(s.cls==='shift-N') countN++;
    else if(s.cls==='shift-128') count128++;
    else if(s.cls==='shift-special') countD++;
    else countOff++;
  });
  document.getElementById('statStrip').innerHTML = `
    <div class="stat-pill"><div class="num">${countD}</div><div class="lbl">白班</div></div>
    <div class="stat-pill"><div class="num">${countE+countN}</div><div class="lbl">小／大夜</div></div>
    <div class="stat-pill"><div class="num">${countStar}</div><div class="lbl">控台次數</div></div>
    <div class="stat-pill"><div class="num">${countOff}</div><div class="lbl">休假</div></div>
  `;

  // 月曆格
  let html = '';
  for(let i=0;i<firstDay;i++){ html += '<div class="cal-cell empty"></div>'; }
  for(let d=1; d<=daysInMonth; d++){
    const raw = personalSched[String(d)] || '';
    const s = parseDisplayShift(raw);
    const isToday = isThisMonth && d===todayDate;
    html += `<div class="cal-cell${isToday?' today':''}" onclick="openDayModal(${d},'${raw}')">
      <div class="dnum">${d}</div>
      <span class="shift-tag ${s.cls}">${s.label}${s.star?'<span class=\"star\">★</span>':''}</span>
    </div>`;
  }
  const totalCells = firstDay + daysInMonth;
  const remain = (7 - (totalCells % 7)) % 7;
  for(let i=0;i<remain;i++){ html += '<div class="cal-cell empty"></div>'; }
  document.getElementById('calGrid').innerHTML = html;
}

// ══════════════════════════════════════════
// 單日詳情
// ══════════════════════════════════════════
const DAY_ZH = ['日','一','二','三','四','五','六'];
function openDayModal(day, raw){
  const date = new Date(viewYear, viewMonth-1, day);
  const dow = DAY_ZH[date.getDay()];
  document.getElementById('dm-date').textContent = viewMonth+'月'+day+'日（'+dow+'）';
  const s = parseDisplayShift(raw);
  const shiftText = s.label + (s.star ? ' ★' : '');
  document.getElementById('dm-shift').textContent = shiftText;
  document.getElementById('dm-ctrl').textContent = s.star ? ctrlLabel(raw, dow) : '—';
  document.getElementById('dm-raw').textContent = raw || '（無排班）';
  document.getElementById('dayModal').classList.add('open');
}
function closeDayModal(){
  document.getElementById('dayModal').classList.remove('open');
}
document.getElementById('dayModal').addEventListener('click', e=>{
  if(e.target===e.currentTarget) closeDayModal();
});

// 初始化：嘗試自動登入
// ══════════════════════════════════════════
(function init(){
  const saved = localStorage.getItem('my_schedule_emp');
  const savedPw = localStorage.getItem('my_schedule_pw');
  if(saved && savedPw === SHARED_PASSWORD){
    const found = Object.entries(EMP_ID_MAP).find(([name, eid]) => eid === saved);
    if(found){
      currentName = found[0];
      currentEmpId = found[1];
      showPage('calendar');
      renderProfile();
      renderCalendar();
      return;
    }
  }
  showPage('login');
})();
</script>
